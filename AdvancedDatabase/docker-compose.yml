name: ragdb-batch-experiment

services:
  postgres_meta:
    image: postgres:16
    container_name: rag_postgres_meta
    environment:
      POSTGRES_DB: ${POSTGRES_META_DB:-rag_meta}
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag}
    ports:
      - "${POSTGRES_META_PORT:-5433}:5432"
    shm_size: 1gb
    volumes:
      - postgres_meta_data:/var/lib/postgresql/data
      - ./infra/postgres_meta/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-rag} -d ${POSTGRES_META_DB:-rag_meta}"
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres_pgvector:
    image: pgvector/pgvector:pg16
    container_name: rag_postgres_pgvector
    environment:
      POSTGRES_DB: ${POSTGRES_PGVECTOR_DB:-rag_vector}
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag}
    ports:
      - "${POSTGRES_PGVECTOR_PORT:-5434}:5432"
    shm_size: 1gb
    volumes:
      - postgres_pgvector_data:/var/lib/postgresql/data
      - ./infra/postgres_pgvector/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-rag} -d ${POSTGRES_PGVECTOR_DB:-rag_vector}"
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: rag_qdrant
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "timeout 3 bash -c '</dev/tcp/127.0.0.1/6333' || exit 1"
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    stop_grace_period: 30s

volumes:
  postgres_meta_data:
  postgres_pgvector_data:
  qdrant_data:
