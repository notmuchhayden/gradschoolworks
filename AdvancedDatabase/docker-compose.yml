services:
  postgres_meta:
    image: postgres:16
    container_name: rag_postgres_meta
    environment:
      POSTGRES_DB: rag_meta
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
    ports:
      - "5433:5432"
    volumes:
      - postgres_meta_data:/var/lib/postgresql/data
      - ./infra/postgres_meta/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag_meta"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres_pgvector:
    image: pgvector/pgvector:pg16
    container_name: rag_postgres_pgvector
    environment:
      POSTGRES_DB: rag_vector
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
    ports:
      - "5434:5432"
    volumes:
      - postgres_pgvector_data:/var/lib/postgresql/data
      - ./infra/postgres_pgvector/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag_vector"]
      interval: 5s
      timeout: 3s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: rag_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "timeout 3 bash -c '</dev/tcp/127.0.0.1/6333' || exit 1"
        ]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_meta_data:
  postgres_pgvector_data:
  qdrant_data:
